name: Build APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true
          cache-key: flutter-3.24.0-stable

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Install dependencies
        run: flutter pub get

      - name: Create assets directories
        run: |
          mkdir -p assets/images
          mkdir -p assets/audio
          mkdir -p assets/fonts
          touch assets/images/.gitkeep
          touch assets/audio/.gitkeep
          touch assets/fonts/.gitkeep

      - name: Flutter info
        run: |
          flutter --version
          flutter doctor -v

      - name: Build debug APK
        id: build_debug
        run: |
          flutter pub get
          flutter build apk --debug
          echo "=== APK FILES FOUND ==="
          find build -name "*.apk" -type f
          ls -lh build/app/outputs/flutter-apk/ 2>/dev/null || echo "Directory not found"

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: tap-cockroach-debug
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 14

      - name: Build release APK
        id: build_release
        run: |
          flutter build apk --release
          echo "=== APK FILES FOUND ==="
          find build -name "*.apk" -type f
          ls -lh build/app/outputs/flutter-apk/ 2>/dev/null || echo "Directory not found"

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: tap-cockroach-release
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
