name: Build APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Cache dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            /opt/hostedtoolcache/Flutter/3.24.0-stable/android-sdk/linux/
          key: ${{ runner.os }}-flutter-${{ hashFiles('**/pubspec.yaml') }}
          restore-keys: |
            ${{ runner.os }}-flutter-

      - name: Install dependencies
        run: |
          flutter pub get

      - name: Create assets directories
        run: |
          mkdir -p assets/images
          mkdir -p assets/audio
          mkdir -p assets/fonts
          touch assets/images/.gitkeep
          touch assets/audio/.gitkeep
          touch assets/fonts/.gitkeep

      - name: Flutter info
        run: |
          flutter --version
          flutter doctor -v

      - name: Flutter analyze
        run: |
          flutter analyze --no-fatal-infos --no-fatal-warnings || true

      - name: Build debug APK
        id: debug_build
        run: |
          flutter pub get
          flutter build apk --debug 2>&1 | tee debug.log
          echo "EXIT=$?" >> debug.log
          echo "=== APK CHECK ===" >> debug.log
          ls -la build/app/outputs/flutter-apk/ >> debug.log 2>&1 || echo "No dir" >> debug.log
          find build -name "*.apk" >> debug.log 2>&1 || echo "No APK" >> debug.log
          cat debug.log

      - name: Save debug log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-log
          path: debug.log
          retention-days: 1

      - name: Upload debug APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: tap-cockroach-debug
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 14

      - name: Build release APK
        id: release_build
        run: |
          flutter build apk --release 2>&1 | tee release.log
          echo "EXIT=$?" >> release.log
          echo "=== APK CHECK ===" >> release.log
          ls -la build/app/outputs/flutter-apk/ >> release.log 2>&1 || echo "No dir" >> release.log
          find build -name "*.apk" >> release.log 2>&1 || echo "No APK" >> release.log
          cat release.log

      - name: Save release log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-log
          path: release.log
          retention-days: 1

      - name: Upload release APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tap-cockroach-release
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30