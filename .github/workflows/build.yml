name: Build APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Cache dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            /opt/hostedtoolcache/Flutter/3.24.0-stable/android-sdk/linux/
          key: ${{ runner.os }}-flutter-${{ hashFiles('**/pubspec.yaml') }}
          restore-keys: |
            ${{ runner.os }}-flutter-

      - name: Install dependencies
        run: |
          flutter pub get

      - name: Create assets directories
        run: |
          mkdir -p assets/images
          mkdir -p assets/audio
          mkdir -p assets/fonts
          touch assets/images/.gitkeep
          touch assets/audio/.gitkeep
          touch assets/fonts/.gitkeep

      - name: Flutter info
        run: |
          flutter --version
          flutter doctor -v

      - name: Flutter analyze
        run: |
          flutter analyze --no-fatal-infos --no-fatal-warnings || true

      - name: Build debug APK
        id: debug_build
        run: |
          echo "=== BUILD START ==="
          flutter pub get
          flutter build apk --debug
          EXITCODE=$?
          echo "EXIT_CODE=$EXITCODE"
          if [ $EXITCODE -ne 0 ]; then
            echo "=== DEBUG BUILD FAILED WITH EXIT CODE $EXITCODE ==="
            exit $EXITCODE
          fi
          echo "=== Checking APK exists ==="
          if [ -f build/app/outputs/flutter-apk/app-debug.apk ]; then
            echo "APK found: $(ls -lh build/app/outputs/flutter-apk/app-debug.apk)"
          else
            echo "=== APK NOT FOUND! ==="
            find build -name "*.apk" 2>/dev/null || echo "No APK files at all"
            ls -la build/ 2>/dev/null || echo "build/ does not exist"
            exit 1
          fi

      - name: Upload debug APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: tap-cockroach-debug
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 14

      - name: Build release APK
        id: release_build
        run: |
          echo "=== BUILD START ==="
          flutter build apk --release
          EXITCODE=$?
          echo "EXIT_CODE=$EXITCODE"
          if [ $EXITCODE -ne 0 ]; then
            echo "=== RELEASE BUILD FAILED WITH EXIT CODE $EXITCODE ==="
            exit $EXITCODE
          fi
          echo "=== Checking APK exists ==="
          if [ -f build/app/outputs/flutter-apk/app-release.apk ]; then
            echo "APK found: $(ls -lh build/app/outputs/flutter-apk/app-release.apk)"
          else
            echo "=== APK NOT FOUND! ==="
            find build -name "*.apk" 2>/dev/null || echo "No APK files at all"
            exit 1
          fi

      - name: Upload release APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tap-cockroach-release
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30