name: Build APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Cache dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            /opt/hostedtoolcache/Flutter/3.24.0-stable/android-sdk/linux/
          key: ${{ runner.os }}-flutter-${{ hashFiles('**/pubspec.yaml') }}
          restore-keys: |
            ${{ runner.os }}-flutter-

      - name: Install dependencies
        run: |
          flutter pub get

      - name: Create assets directories
        run: |
          mkdir -p assets/images
          mkdir -p assets/audio
          mkdir -p assets/fonts
          touch assets/images/.gitkeep
          touch assets/audio/.gitkeep
          touch assets/fonts/.gitkeep

      - name: Debug build info
        run: |
          flutter --version
          flutter doctor -v 2>&1 | tee flutter_doctor.txt
          flutter analyze 2>&1 | tee flutter_analyze.txt || true

      - name: Upload diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: flutter-diagnostics
          path: |
            flutter_doctor.txt
            flutter_analyze.txt
          retention-days: 3

      - name: Build debug APK
        run: |
          flutter build apk --debug 2>&1 | tee build_output.txt
          echo "EXIT_CODE=$?" >> build_output.txt
          exit ${PIPESTATUS[0]}

      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tap-cockroach-debug
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 14

      - name: Upload build output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: build_output.txt
          retention-days: 3

      - name: Build release APK
        if: always()
        run: |
          flutter build apk --release 2>&1 | tee release_output.txt
          echo "EXIT_CODE=$?" >> release_output.txt
          exit ${PIPESTATUS[0]}
        env:
          KEYSTORE_FILE: ${{ secrets.KEYSTORE_FILE }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Upload release APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tap-cockroach-release
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Upload release output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-output
          path: release_output.txt
          retention-days: 3

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v1
        with:
          files: build/app/outputs/flutter-apk/app-release.apk
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}